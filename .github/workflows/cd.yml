name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy to OVH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OVH_HOST }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.OVH_SSH_KEY }}
          script: |
            cd /opt/toxic-cicd
            git pull origin main
            docker build -t toxic-cicd .
            docker stop toxic-cicd || true
            docker rm toxic-cicd || true
            docker run -d \
              --name toxic-cicd \
              --restart unless-stopped \
              -p 8080:8080 \
              -e GCS_ARTIFACT_BUCKET='${{ secrets.GCS_ARTIFACT_BUCKET }}' \
              toxic-cicd

